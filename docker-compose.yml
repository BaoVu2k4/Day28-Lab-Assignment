# docker-compose.yml — Lab #28 Full Platform Integration
# -----------------------------------------------------------------------------
# name: cố định để container có tên ổn định (lab28-kafka-1, ...) — production
# readiness check dựa vào tên này.
name: lab28

services:
  # ── Kafka Stack ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lab28-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    restart: unless-stopped
    healthcheck:
      # 'srvr' là 4lw command được enable mặc định; báo cáo trạng thái server.
      test: ["CMD", "bash", "-c", "echo srvr > /dev/tcp/localhost/2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab28-kafka-1
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listeners: EXTERNAL cho host (localhost:9092), INTERNAL cho các
      # container khác (kafka:29092). Đây là fix quan trọng để prefect-worker
      # trong Docker kết nối được tới broker.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15

  # Tạo sẵn topic data.raw để không phụ thuộc auto-create.
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lab28-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic data.raw --partitions 1 --replication-factor 1
        echo "Topic data.raw ready:"
        kafka-topics --bootstrap-server kafka:29092 --list
    restart: "no"

  # ── Prefect ───────────────────────────────────────────────
  prefect-orion:
    image: prefecthq/prefect:2.14.0-python3.10
    container_name: lab28-prefect-orion-1
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 10

  prefect-worker:
    image: prefecthq/prefect:2.14.0-python3.10
    container_name: lab28-prefect-worker-1
    command: >
      sh -c "python -m pip install --no-cache-dir --retries 10 --timeout 120 'numpy<2' kafka-python==2.0.2 pandas==2.1.4 pyarrow==14.0.2;
      prefect work-pool create --type process lab28-worker 2>/dev/null || true;
      prefect worker start -p lab28-worker -n lab28-worker"
    environment:
      PREFECT_API_URL: http://prefect-orion:4200/api
      KAFKA_BOOTSTRAP: kafka:29092
      DELTA_PATH: /opt/delta-lake/raw
    volumes:
      - ./prefect/flows:/opt/prefect/flows
      - ./delta-lake:/opt/delta-lake
    depends_on:
      prefect-orion:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Vector Store (Qdrant) ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lab28-qdrant-1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── Feature Store (Feast via Redis) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: lab28-redis-1
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mock GPU (thay Kaggle vLLM) ───────────────────────────
  # Trên production thật: tắt service này, set VLLM_NGROK_URL trong .env
  # trỏ tới Kaggle vLLM qua ngrok. Contract OpenAI-compatible giống hệt.
  mock-vllm:
    build: ./mock-gpu
    container_name: lab28-mock-vllm-1
    environment:
      APP_MODULE: vllm_server:app
      APP_PORT: "8001"
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Mock Embedding (thay Kaggle sentence-transformers) ────
  mock-embed:
    build: ./mock-gpu
    container_name: lab28-mock-embed-1
    environment:
      APP_MODULE: embed_server:app
      APP_PORT: "8002"
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Monitoring Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: lab28-prometheus-1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: lab28-grafana-1
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: lab28-api-gateway-1
    ports:
      - "8000:8000"
    environment:
      # Ưu tiên VLLM_NGROK_URL (Kaggle); nếu trống fallback về mock-vllm local.
      VLLM_URL: ${VLLM_NGROK_URL:-http://mock-vllm:8001}
      EMBED_URL: ${EMBED_NGROK_URL:-http://mock-embed:8002}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-lab28-platform}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  prefect_data:
  qdrant_data:
  grafana_data:
